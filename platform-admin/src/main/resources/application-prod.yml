# ==================== 生产环境配置 ====================
# 主机/端口/账号均可用环境变量覆盖，默认值与 dev 一致，指向外部 192.168.244.128。
# 例如容器化部署时：
#   -e MYSQL_HOST=mysql -e REDIS_HOST=redis -e RABBITMQ_HOST=rabbitmq
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:192.168.244.128}:${MYSQL_PORT:3306}/platform_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:Yx20011102.}
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      stat-view-servlet:
        enabled: false
  data:
    redis:
      host: ${REDIS_HOST:192.168.244.128}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  rabbitmq:
    host: ${RABBITMQ_HOST:192.168.244.128}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:Yx20011102!}
    virtual-host: ${RABBITMQ_VHOST:/}
    connection-timeout: 15000
    # 发布确认机制（correlated: 异步回调确认）
    publisher-confirm-type: correlated
    # 开启消息退回机制
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        # 手动签收模式
        acknowledge-mode: manual
        prefetch: 1
        concurrency: 1
        max-concurrency: 5
        default-requeue-rejected: false

# 生产环境关闭部分 starter 自动配置
file:
  upload:
    path: /data/platform/uploads

platform:
  thread-pool:
    core-pool-size: 10
    max-pool-size: 50
    queue-capacity: 500
  rate-limiter:
    default-limit: 200

logging:
  level:
    root: warn
    com.platform: info
