# ==================== 生产环境配置 ====================
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://prod-mysql:3306/platform_db?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=GMT%2B8
    username: ${MYSQL_USERNAME:platform}
    password: ${MYSQL_PASSWORD}
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      stat-view-servlet:
        enabled: false
  data:
    redis:
      host: ${REDIS_HOST:prod-redis}
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  rabbitmq:
    host: ${RABBITMQ_HOST:prod-rabbitmq}
    port: 5672
    username: ${RABBITMQ_USERNAME:platform}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /prod

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    banner: false

# 生产环境关闭部分 starter 自动配置
file:
  upload:
    path: /data/platform/uploads

platform:
  thread-pool:
    core-pool-size: 10
    max-pool-size: 50
    queue-capacity: 500
  rate-limiter:
    default-limit: 200

logging:
  level:
    root: warn
    com.platform: info
