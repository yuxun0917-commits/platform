# ==================== 平台主配置 ====================
server:
  port: 8085
  shutdown: graceful

spring:
  profiles:
    active: dev
  application:
    name: platform-admin
  # ==================== Jackson 全局配置 ====================
  Jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  # ==================== 文件上传大小限制 ====================
  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 100MB
# ==================== Sa-Token 配置 ====================
sa-token:
  # token 名称（同时也是 Cookie 名称）
  token-name: Authorization
  # token 有效期（秒），默认30天
  timeout: 10800
  # token 临时有效期（秒），指定时间内无操作则过期
  active-timeout: 10800
  # 是否允许同一账号并发登录
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token
  is-share: true
  # token 风格（uuid）
  token-style: simple-uuid
  # 是否输出操作日志
  is-log: true
  is-read-cookie: false
  token-prefix: Bearer

# ==================== Mybatis-Plus 配置 ====================
mybatis-plus:
  global-config:
    enable-sql-runner: true

# ==================== SpringDoc OpenAPI 配置 ====================
# 注意：分组配置已移至 SpringDocGroupConfig.java（编程式 GroupedOpenApi Bean），
# 通过 addOperationCustomizer 显式绑定 customizer，确保 OperationCustomizer 被调用
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

# ==================== project-starter 自动装配配置 ====================
# 文件上传配置（FileUploadAutoConfiguration）
file:
  upload:
    max-size: 1024
    path: ./uploads
    allowed-types: jpg,jpeg,png,gif,bmp,pdf,doc,docx,xls,xlsx,ppt,pptx,txt,csv,zip,rar
    url-prefix: /file/
    date-path: true

# 线程池配置（ThreadPoolAutoConfiguration）
platform:
  thread-pool:
    enabled: true
    core-pool-size: 5
    max-pool-size: 20
    queue-capacity: 200
    keep-alive-seconds: 60
    thread-name-prefix: platform-async-
  # 限流配置（RateLimiterAutoConfiguration）
  rate-limiter:
    enabled: true
    type: IP
    default-limit: 100
    default-timeout: 60
  redis:
    enabled: true
    ttl: 10
    prefix: "platform:"
  # 验证码配置
  captcha:
    # 验证码缓存过期时间（秒），默认 120 秒
    ttl: 300
