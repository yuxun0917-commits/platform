# ==================== 开发环境配置 ====================
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.244.128:3306/platform_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root
    password: Yx20011102.
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1
      test-on-borrow: false
      test-on-return: false
      test-while-idle: true
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      stat-view-servlet:
        enabled: true
        login-username: admin
        login-password: admin
  # ==================== Redis 配置 ====================
  data:
    redis:
      host: 192.168.244.128
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
        shutdown-timeout: 100ms
  # ==================== RabbitMQ 配置 ====================
  rabbitmq:
    host: 192.168.244.128
    port: 5672
    username: admin
    password: Yx20011102!
    virtual-host: /
    connection-timeout: 15000
    # 发布确认机制（correlated: 异步回调确认）
    publisher-confirm-type: correlated
    # 开启消息退回机制
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        # 手动签收模式
        acknowledge-mode: manual
        prefetch: 1
        concurrency: 1
        max-concurrency: 5
        default-requeue-rejected: false